name: iovib-py39
channels:
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    - wandb                     # Will install the latest version (supports 86-char keys)
    - numpy==1.21.6             # Numpy compatible with Torch 1.9
    # Installing Torch 1.9.0 specifically with CUDA 11.1 support
    - torch==1.9.0+cu111 --extra-index-url https://download.pytorch.org/whl/cu111
    - torchvision==0.10.0+cu111 --extra-index-url https://download.pytorch.org/whl/cu111
    - torchaudio==0.9.0 --extra-index-url https://download.pytorch.org/whl/cu111
    - scikit-learn
    - pandas
    - matplotlib
