
project: CNNIO-SKE-MRI-DEPTH
entity: cspark5484
program: train_cls_new.py  # REPLACE with your actual python file name
method: grid                  # Use 'grid' for all combinations, or 'bayes' for optimization
metric:
  name: Test AUC
  goal: maximize
parameters:
  # --- Variables to Sweep (Grid Search) ---
  batch_size:
    value: 256
  # lr:
  #   min: 0.00001
  #   max: 0.0001
  #   distribution: log_uniform_values
  lr:
    value: 0.005
  # --- Base Parameters (Fixed for every run) ---
  cls_type:
    value: "CNN"
  n_data:
    value: 100.0
  data:
    value: "ske_3.0_0.05_35.0"
  sigma:
    value: 3.0
  amplitude:
    value: 0.05
  noise_level:
    value: 35.0
  train_type:                     # Maps to your 'image="measure"' requirement
    value: "measure"
  depth:
    value: 1
  epochs:
    value: 10000
  patience:
    value: 15
  num_workers:
    value: 4
  use_ram:
    value: 0
  scheduler_gamma:
    value: 0.5
  # You can add other static parameters here to ensure they are tracked
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "3"
  - ${args}
