project: CNNIO-SKS-MRI-FULL
entity: cspark5484
program: train_cls_gaussianIO_EMA.py  # REPLACE with your actual python file name
method: grid                  # Use 'grid' for all combinations, or 'bayes' for optimization
metric:
  name: Test AUC
  goal: maximize
parameters:
  # --- Variables to Sweep (Grid Search) ---
  batch_size:
    value: 256
  # lr:
  #   min: 0.00001
  #   max: 0.0001
  #   distribution: log_uniform_values
  lr:
    values: [0.005, 0.001]
  kl:
    value: 1e-2
  # --- Base Parameters (Fixed for every run) ---
  z_dim:
    value: 1024
  cls_type:
    value: "CNN"
  proporation:
    value: 1.0
  data:
    value: "sks_3.0_0.2_25.0_c2_num_signals_diffusion_n"
  train_type:                     # Maps to your 'image="measure"' requirement
    value: "measure"
  depth:
    value: 4
  epochs:
    value: 10000
  patience:
    value: 39
  num_workers:
    value: 4
  ioloss:
    value: 1.0
  use_ram:
    value: 1
  scheduler_gamma:
    value: 0.5
  # You can add other static parameters here to ensure they are tracked
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "1"
  - ${args}
