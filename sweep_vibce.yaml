project: VIBCE-SKS-MRI-SMALL
entity: cspark5484
program: train_cls.py  # REPLACE with your actual python file name
method: grid                  # Use 'grid' for all combinations, or 'bayes' for optimization
metric:
  name: Test AUC
  goal: maximize
parameters:
  # --- Variables to Sweep (Grid Search) ---
  batch_size:
    value: 64
  # lr:
  #   min: 0.0001
  #   max: 0.001
  #   distribution: log_uniform_values
  lr:
    value: 0.0005
  kl:
    values: [1e-1, 1e-3, 1e-5, 1e-8, 1e+0, 1e+2]
  # --- Base Parameters (Fixed for every run) ---
  z_dim:
    value: 64
  cls_type:
    value: "VIBCNN"
  proporation:
    value: 0.005
  data:
    value: "sks_3.0_0.2_25.0_c2_num_signals_diffusion_n"
  train_type:                     # Maps to your 'image="measure"' requirement
    value: "measure"
  depth:
    value: 4
  epochs:
    value: 20000
  patience:
    value: 100
  # You can add other static parameters here to ensure they are tracked
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "6"
  - ${args}
